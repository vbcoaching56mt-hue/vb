<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VB Coaching - Dashboard Interactif</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 overflow-hidden text-gray-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- MOTEUR DE CALCUL IA (Traduit depuis Python) ---
    const ANCHOR_MAP = {
        1: { code: 'TF', label: 'Technique' },
        2: { code: 'GM', label: 'Management' },
        3: { code: 'AU', label: 'Autonomie' },
        4: { code: 'SE', label: 'Sécurité' },
        5: { code: 'EC', label: 'Entrepreneur' },
        6: { code: 'SV', label: 'Service' },
        7: { code: 'CH', label: 'Défi' },
        0: { code: 'LS', label: 'Lifestyle' }
    };

    const calculateScheinAnchors = (responses, top3Questions, top3Weight = 4) => {
        let totals = {};
        let counts = {};
        Object.values(ANCHOR_MAP).forEach(anchor => {
            totals[anchor.code] = 0.0;
            counts[anchor.code] = 0;
        });

        Object.entries(responses).forEach(([qIdStr, score]) => {
            const qId = parseInt(qIdStr);
            const anchorKey = qId % 8;
            const anchor = ANCHOR_MAP[anchorKey];
            let actualScore = score;
            if (top3Questions.includes(qId)) actualScore += top3Weight;
            
            totals[anchor.code] += actualScore;
            counts[anchor.code] += 1;
        });

        let averages = [];
        Object.values(ANCHOR_MAP).forEach(anchor => {
            let avg = counts[anchor.code] > 0 ? (totals[anchor.code] / counts[anchor.code]) : 0;
            averages.push({ 
                subject: anchor.label, 
                code: anchor.code,
                A: parseFloat(avg.toFixed(2))
            });
        });
        return averages;
    };

    // --- COMPOSANT RADAR CHART ---
    const RadarChartComponent = ({ data }) => {
        const canvasRef = useRef(null);
        let chartInstance = useRef(null);

        useEffect(() => {
            if (chartInstance.current) chartInstance.current.destroy();
            const ctx = canvasRef.current.getContext('2d');
            
            chartInstance.current = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: data.map(d => d.subject),
                    datasets: [{
                        label: 'Score Schein',
                        data: data.map(d => d.A),
                        backgroundColor: 'rgba(244, 63, 94, 0.3)', // Rose Tailwind
                        borderColor: '#f43f5e',
                        borderWidth: 2,
                        pointBackgroundColor: '#f43f5e',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            suggestedMin: 0,
                            suggestedMax: 6,
                            ticks: { stepSize: 1, backdropColor: 'transparent', color: '#9ca3af' },
                            pointLabels: { font: { size: 10, weight: '500' }, color: '#4b5563' }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
            return () => chartInstance.current.destroy();
        }, [data]);

        return <div style={{ position: 'relative', width: '100%', height: '280px' }}>
             <canvas ref={canvasRef} />
        </div>;
    };


    // --- APPLICATION GLOBALE ---
    function App() {
      const [activeTab, setActiveTab] = useState('accueil');
      const [radarData, setRadarData] = useState([]);
      const [topAnchors, setTopAnchors] = useState([]);

      useEffect(() => {
          // Simulation des données de la Session (les réponses du bénéficiaire)
          const sampleResponses = {};
          for (let i = 1; i <= 40; i++) sampleResponses[i] = 3;
          // Integration des notes saisies pendant le test
          sampleResponses[1] = 6; // TF
          sampleResponses[2] = 4; // GM
          sampleResponses[3] = 6; // AU
          sampleResponses[4] = 6; // SE
          sampleResponses[5] = 5; // EC
          // On force des items "Sécurité" pour correspondre au profil
          sampleResponses[12] = 6; // SE
          sampleResponses[20] = 6; // SE
          
          const top3Selections = [4, 12, 1]; // Top 3 choisi par le client pendant la phase 2

          // Exécution du moteur de calcul JS interne
          const computed = calculateScheinAnchors(sampleResponses, top3Selections);
          setRadarData(computed);
          
          // Identifier les 2 dominantes
          const sorted = [...computed].sort((a,b) => b.A - a.A);
          setTopAnchors([sorted[0], sorted[1]]);
      }, []);

      const AccueilView = () => (
          <div className="flex flex-col items-center justify-center pt-20">
              <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg text-rose-500 mb-6 border border-gray-100">
                  <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
              </div>
              <h1 className="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">Bonjour John.</h1>
              <p className="text-lg text-gray-500 max-w-lg text-center leading-relaxed">Bienvenue sur votre espace VB Coaching. Votre consultant a finalisé l'analyse de vos tests d'ancres de carrière. Vous êtes prêt pour aborder la Phase 2 de l'élicitation.</p>
              
              <div className="mt-10 grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                     <h3 className="font-bold text-gray-800 text-lg mb-2">Prochaine Session</h3>
                     <p className="text-sm text-gray-500 mb-4">Mardi 28 Mars 2026 à 14h00</p>
                     <div className="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg text-sm font-medium">Lien de la visioconférence validé</div>
                  </div>
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 bg-gradient-to-br from-white to-rose-50">
                     <h3 className="font-bold text-gray-800 text-lg mb-2">Bilan disponible</h3>
                     <p className="text-sm text-gray-500 mb-4">Vos résultats d'évaluation ont été traités par notre algorithme IA.</p>
                     <button onClick={() => setActiveTab('bilan')} className="w-full bg-rose-500 text-white font-bold py-2 rounded-lg hover:bg-rose-600 transition-colors shadow-md">
                         Consulter mon bilan
                     </button>
                  </div>
              </div>
          </div>
      );

      const BilanView = () => (
          <div className="space-y-6 animate-fade-in">
              <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">Espace Connaissance de soi</h1>
              <p className="text-gray-500 text-lg">Retrouvez la synthèse de vos évaluations avec prise en charge algorithmique.</p>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-8">
                  {/* Module : Mes Intérêts */}
                  <div className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                      <h2 className="text-xl font-bold text-gray-800 mb-6 flex items-center">
                          <span className="w-2 h-6 bg-rose-500 rounded-full mr-3"></span> Mes Intérêts Dominants
                      </h2>
                      <div className="grid grid-cols-2 gap-4">
                          <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-5 cursor-pointer hover:bg-indigo-100 transition-all group">
                              <div className="w-12 h-12 bg-indigo-500 text-white rounded-xl flex items-center justify-center mb-4 shadow-sm group-hover:scale-105 transition-transform"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg></div>
                              <h3 className="font-bold text-indigo-900 text-lg">Conventionnel</h3>
                          </div>
                          <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 cursor-pointer hover:bg-emerald-100 transition-all group">
                              <div className="w-12 h-12 bg-emerald-500 text-white rounded-xl flex items-center justify-center mb-4 shadow-sm group-hover:scale-105 transition-transform"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg></div>
                              <h3 className="font-bold text-emerald-900 text-lg">Investigateur</h3>
                          </div>
                      </div>
                  </div>

                  {/* Module : Graphique Radar Animé */}
                  <div className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                      <div className="flex justify-between items-center mb-4">
                          <h2 className="text-xl font-bold text-gray-800 flex items-center">
                              <span className="w-2 h-6 bg-rose-500 rounded-full mr-3"></span> Vos Ancres de Carrière
                          </h2>
                          <span className="bg-blue-50 text-blue-700 text-xs font-semibold px-2 py-1 rounded">IA Analysed</span>
                      </div>
                      
                      {radarData.length > 0 && <RadarChartComponent data={radarData} />}
                      
                      {topAnchors.length > 1 && (
                          <div className="mt-2 text-center bg-gray-50 py-2 px-4 rounded-xl text-sm border border-gray-100">
                              Moteur: Dominantes sur <strong className="text-rose-600">{topAnchors[0].subject} ({topAnchors[0].A})</strong> et <strong className="text-rose-600">{topAnchors[1].subject} ({topAnchors[1].A})</strong>.
                          </div>
                      )}
                  </div>
              </div>

              {/* Mon Projet Pro */}
              <div className="mt-8 bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                  <div className="bg-gray-900 px-8 py-5">
                      <h2 className="text-xl font-bold text-white">Synthèse de mon Projet Professionnel</h2>
                  </div>
                  <div className="p-8 relative">
                      <textarea 
                          className="w-full h-32 p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:outline-none text-gray-700 font-serif"
                          placeholder="Notez vos ambitions étudiées avec le consultant..."
                          defaultValue={`D'après le calcul en direct de l'algorithme, mes ancres fortes sont la sécurisation de mon poste et la technicité de mon métier. Mon projet pro s'orientera donc vers un rôle non-managérial en CDI.`}
                      />
                      <button className="absolute bottom-10 right-10 bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition-colors">
                          Enregistrer la version
                      </button>
                  </div>
              </div>
          </div>
      );

      // Composant de Navigation
      const Sidebar = () => (
          <div className="w-64 bg-gray-900 text-gray-300 flex flex-col h-full shrink-0">
              <div className="flex items-center h-20 px-6 border-b border-gray-800 bg-gray-950">
                  <div className="w-8 h-8 rounded-lg bg-rose-500 text-white font-bold flex items-center justify-center mr-3 shadow-[0_0_15px_rgba(244,63,94,0.5)]">VB</div>
                  <span className="text-xl font-bold text-white tracking-widest">ERP</span>
              </div>
              <nav className="flex-1 px-4 py-8 space-y-2">
                  <button onClick={() => setActiveTab('accueil')} className={`w-full flex items-center px-4 py-3.5 rounded-xl font-medium transition-all ${activeTab === 'accueil' ? 'bg-rose-500 text-white shadow-lg' : 'hover:bg-gray-800 hover:text-white'}`}>Accueil</button>
                  <button onClick={() => setActiveTab('bilan')} className={`w-full flex items-center px-4 py-3.5 rounded-xl font-medium transition-all ${activeTab === 'bilan' ? 'bg-rose-500 text-white shadow-lg' : 'hover:bg-gray-800 hover:text-white'}`}>Mon Bilan</button>
              </nav>
          </div>
      );

      return (
          <div className="flex h-screen w-full bg-gray-50 border-r border-t shadow-2xl overflow-hidden">
              <Sidebar />
              <div className="flex-1 flex flex-col h-full bg-gray-50 overflow-y-auto">
                  <header className="bg-white px-10 py-5 border-b border-gray-100 shadow-sm sticky top-0 z-10 flex justify-between items-center">
                      <div>
                          <h2 className="text-xl font-bold text-gray-800">Espace Candidat</h2>
                      </div>
                      <div className="w-10 h-10 rounded-full bg-gray-100 border-2 border-gray-200 flex items-center justify-center font-bold text-sm text-gray-600">JC</div>
                  </header>
                  <main className="p-10 pb-20 max-w-6xl mx-auto w-full">
                      {activeTab === 'accueil' ? <AccueilView /> : <BilanView />}
                  </main>
              </div>
          </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
